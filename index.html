<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un café por la democracia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(160deg, #e8752c 0%, #d4601a 30%, #b84a10 60%, #1a0800 100%);
  color: #fff;
}

/* ===== VIEWS ===== */
.view { display: none; height: 100vh; flex-direction: column; }
.view.active { display: flex !important; }

/* ===== LOGIN ===== */
#loginView { align-items: center; justify-content: center; }
.login-box { text-align: center; max-width: 360px; width: 90%; }
.login-box h1 { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
.login-box p { font-size: 0.85rem; opacity: 0.6; margin-bottom: 24px; }
.login-box input {
  width: 100%; padding: 14px 18px; font-size: 1rem;
  background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px; color: #fff; font-family: inherit; text-align: center; letter-spacing: 2px;
}
.login-box input::placeholder { color: rgba(255,255,255,0.4); letter-spacing: 0; }
.login-box input:focus { outline: none; border-color: #fff; }
.login-box button {
  margin-top: 14px; padding: 12px 32px; font-size: 0.9rem; font-weight: 700;
  background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.5);
  color: #fff; border-radius: 6px; cursor: pointer; font-family: inherit;
  text-transform: uppercase; letter-spacing: 1px;
}
.login-box button:hover { background: rgba(255,255,255,0.25); }
.login-err { margin-top: 12px; font-size: 0.8rem; color: #ffcdd2; display: none; }

/* ===== ADMIN VIEW ===== */
#adminView { padding: 24px 40px; gap: 16px; overflow-y: auto; }
.admin-header { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.admin-header h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900; }
.admin-header .ctrl { display: flex; gap: 8px; }
.btn {
  padding: 8px 16px; font-size: 0.75rem; font-weight: 600;
  background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.3);
  color: #fff; border-radius: 5px; cursor: pointer; font-family: inherit; transition: background 0.2s;
}
.btn:hover { background: rgba(0,0,0,0.6); }
.btn-live {
  background: rgba(255,255,255,0.15); border-color: #fff; font-size: 0.85rem; padding: 10px 24px;
}
.btn-live:hover { background: rgba(255,255,255,0.3); }

.admin-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex: 1; overflow-y: auto;
}
.admin-section {
  background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; padding: 20px; overflow-y: auto;
}
.admin-section h2 {
  font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700;
  margin-bottom: 12px; opacity: 0.9;
}
.admin-section label {
  display: block; font-size: 0.65rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1px; opacity: 0.5;
  margin-top: 10px; margin-bottom: 4px;
}
.admin-section input, .admin-section textarea {
  width: 100%; padding: 8px 10px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 4px; color: #fff; font-family: inherit; font-size: 0.85rem;
}
.admin-section textarea { min-height: 70px; resize: vertical; line-height: 1.5; }
.save-status { font-size: 0.75rem; opacity: 0.6; }

/* Topics cards */
.topics-list { display: flex; flex-direction: column; gap: 14px; }
.topic-card {
  background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 14px;
}
.topic-card h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 8px; }
.topic-actions { display: flex; gap: 6px; margin-top: 10px; }
.topic-actions button {
  padding: 4px 10px; font-size: 0.65rem; font-weight: 600;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  color: #fff; border-radius: 3px; cursor: pointer; font-family: inherit;
}
.topic-actions button:hover { background: rgba(255,255,255,0.2); }
.topic-actions button.btn-danger:hover { background: rgba(255,80,80,0.3); }
.add-btn {
  padding: 12px; text-align: center; border: 2px dashed rgba(255,255,255,0.2);
  border-radius: 8px; cursor: pointer; opacity: 0.5; font-size: 0.85rem;
}
.add-btn:hover { opacity: 0.8; }

/* Color pickers */
.color-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
.color-row input[type="color"] { width: 40px; height: 30px; border: none; border-radius: 4px; cursor: pointer; background: none; }
.color-row span { font-size: 0.75rem; opacity: 0.6; }
.upload-area {
  margin-top: 8px; padding: 16px; text-align: center;
  border: 2px dashed rgba(255,255,255,0.25); border-radius: 8px; cursor: pointer;
}
.upload-area:hover { border-color: rgba(255,255,255,0.5); }
.upload-preview { max-width: 100%; max-height: 100px; margin-top: 8px; border-radius: 4px; }

/* ===== LIVE VIEW ===== */
#liveView { padding: 24px 40px; position: relative; }
.live-header {
  display: flex; justify-content: space-between; align-items: center;
  position: absolute; top: 16px; left: 40px; right: 40px; z-index: 10;
  opacity: 0; transition: opacity 0.3s;
}
#liveView:hover .live-header { opacity: 1; }
.live-badge { display: flex; align-items: center; gap: 6px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
.live-dot { width: 8px; height: 8px; background: #fff; border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }

.live-body {
  flex: 1; display: grid; grid-template-columns: 1fr 280px; gap: 30px; align-items: center;
}
.live-center { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 16px; height: 100%; }

.timer {
  font-family: 'Inter', sans-serif;
  font-size: clamp(8rem, 22vw, 18rem);
  font-weight: 800; font-variant-numeric: tabular-nums;
  letter-spacing: -6px; line-height: 1; transition: color 0.4s;
}
.timer.green { color: #fff; }
.timer.yellow { color: #ffe082; }
.timer.red { color: #1a1a1a; animation: blink 0.8s ease-in-out infinite; }
@keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0.5; } }

.live-topic {
  max-width: 700px; width: 100%; text-align: left;
  padding: 20px; background: rgba(0,0,0,0.2); border-radius: 10px;
}
.live-topic-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem; font-weight: 700; font-style: italic; margin-bottom: 8px;
}
.live-topic-info { font-size: 0.9rem; opacity: 0.8; line-height: 1.6; }

.live-controls {
  display: flex; gap: 10px; margin-top: 10px; justify-content: center;
}
.live-controls button {
  padding: 8px 20px; font-size: 0.8rem; font-weight: 700;
  background: rgba(0,0,0,0.3); border: 1.5px solid rgba(255,255,255,0.4);
  color: #fff; border-radius: 5px; cursor: pointer; font-family: inherit;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.live-controls button:hover { background: rgba(0,0,0,0.5); }
.live-controls button.btn-random {
  border-color: rgba(255,200,50,0.6); color: #ffe082;
}
.live-controls button.btn-random:hover { background: rgba(255,200,50,0.15); }

/* Right panel: QR + questions */
.live-right { display: flex; flex-direction: column; height: 100%; }
.qr-section { text-align: center; margin-bottom: 14px; flex-shrink: 0; }
.qr-section img { width: 110px; height: 110px; border-radius: 8px; background: #fff; padding: 5px; }
.qr-label { font-size: 0.6rem; opacity: 0.4; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
.questions-feed { flex: 1; overflow-y: auto; }
.questions-feed::-webkit-scrollbar { width: 3px; }
.questions-feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 3px; }
.q-item {
  padding: 10px 12px; margin-bottom: 6px;
  background: rgba(0,0,0,0.25); border-left: 3px solid rgba(255,255,255,0.4);
  border-radius: 4px; font-size: 0.8rem; line-height: 1.4;
}
.q-item.new { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.q-time { font-size: 0.55rem; opacity: 0.4; margin-top: 3px; }

/* Custom background */
.custom-bg {
  position: fixed; inset: 0; z-index: -1;
  background-size: cover; background-position: center; background-repeat: no-repeat;
}
</style>
</head>
<body>

<div class="custom-bg" id="customBg"></div>

<!-- ===== LOGIN ===== -->
<div class="view active" id="loginView">
  <div class="login-box">
    <h1>Un café por la democracia</h1>
    <p>Acceso para moderadores</p>
    <input type="password" id="loginPass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Entrar</button>
    <div class="login-err" id="loginErr">Contraseña incorrecta</div>
  </div>
</div>

<!-- ===== ADMIN ===== -->
<div class="view" id="adminView">
  <div class="admin-header">
    <h1>Un café por la democracia — Admin</h1>
    <div class="ctrl">
      <span class="save-status" id="saveStatus"></span>
      <button class="btn" onclick="saveAll()">💾 Guardar</button>
      <button class="btn btn-live" onclick="goLive()">▶ LIVE</button>
    </div>
  </div>

  <div class="admin-grid">
    <!-- TOPICS -->
    <div class="admin-section" style="grid-row: span 2;">
      <h2>Temas del conversatorio</h2>
      <div class="topics-list" id="topicsList"></div>
      <div class="add-btn" onclick="addTopic()">+ Agregar tema</div>
    </div>

    <!-- SPEAKERS & RULES -->
    <div class="admin-section">
      <h2>Panelistas</h2>
      <label>Un nombre por línea</label>
      <textarea id="adminSpeakers" rows="5" oninput="debounceSave()"></textarea>

      <h2 style="margin-top:18px;">Reglas</h2>
      <label>Una regla por línea</label>
      <textarea id="adminRules" rows="5" oninput="debounceSave()"></textarea>

      <h2 style="margin-top:18px;">Timer (segundos por defecto)</h2>
      <input type="number" id="adminTimer" value="180" style="width:100px" oninput="debounceSave()">
    </div>

    <!-- DESIGN -->
    <div class="admin-section">
      <h2>Diseño</h2>
      <label>Imagen de fondo</label>
      <div class="upload-area" onclick="document.getElementById('bgFile').click()">
        <input type="file" id="bgFile" accept="image/*" onchange="handleBgUpload(this)" style="display:none">
        <span style="font-size:0.8rem;opacity:0.6;">Click para subir</span>
        <div id="bgPreview"></div>
      </div>
      <button class="btn" style="margin-top:6px;" onclick="removeBg()">Quitar imagen</button>

      <label>Gradiente de fondo</label>
      <div class="color-row">
        <input type="color" id="colBg1" value="#e8752c" onchange="debounceSave()">
        <span>Inicio</span>
        <input type="color" id="colBg2" value="#1a0800" onchange="debounceSave()">
        <span>Final</span>
      </div>
      <label>Color de texto</label>
      <div class="color-row">
        <input type="color" id="colText" value="#ffffff" onchange="debounceSave()">
      </div>
      <label>Oscurecer fondo (imagen)</label>
      <input type="range" id="bgOverlay" min="0" max="80" value="0" style="width:100%" oninput="debounceSave()">
    </div>
  </div>
</div>

<!-- ===== LIVE ===== -->
<div class="view" id="liveView">
  <div class="live-header">
    <div class="live-badge"><div class="live-dot"></div> EN VIVO</div>
    <div class="ctrl">
      <button class="btn" onclick="exitLive()">✕ Salir</button>
    </div>
  </div>

  <div class="live-body">
    <div class="live-center">
      <div class="timer green" id="timer">03:00</div>
      <div class="live-controls">
        <button onclick="toggleTimer()" id="btnToggle">Iniciar</button>
        <button onclick="resetTimer()">Reset</button>
        <button onclick="prevTopic()">← Tema</button>
        <button onclick="nextTopic()">Tema →</button>
        <button class="btn-random" onclick="randomTopic()">🎲 Random</button>
      </div>
      <div class="live-topic" id="liveTopic">
        <div class="live-topic-title" id="liveTopicTitle">—</div>
        <div class="live-topic-info" id="liveTopicInfo"></div>
      </div>
    </div>

    <div class="live-right">
      <div class="qr-section">
        <img id="qrCode" alt="QR">
        <div class="qr-label">Escanea para preguntar</div>
      </div>
      <div class="questions-feed" id="questionsFeed"></div>
    </div>
  </div>
</div>

<script>
// ===== SUPABASE =====
const SUPA_URL = 'https://subbsyrooygdevejvdlm.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1YmJzeXJvb3lnZGV2ZWp2ZGxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDQ2MTQsImV4cCI6MjA5NjU4MDYxNH0.BT-tGx2-JRosfmNz9AKgVpzdNnvvPK5EzuJEi0EmCYI';
const hdrs = { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

async function supa(path, opts = {}) {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, { headers: hdrs, ...opts });
  if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
  return res.status === 204 ? null : res.json();
}

// ===== STATE =====
const S = {
  debateId: null,
  speakers: [],
  rules: [],
  topics: [],
  design: { bgColor1: '#e8752c', bgColor2: '#1a0800', textColor: '#ffffff', bgImage: '', overlay: 0 },
  temaIdx: 0,
  timerTotal: 180,
  timerRemaining: 180,
  timerRunning: false,
  timerInterval: null,
};

// ===== VIEWS =====
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== LOGIN =====
async function doLogin() {
  const pass = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  try {
    const res = await supa("settings?key=eq.moderator_password&select=value");
    if (res.length && pass === res[0].value) {
      sessionStorage.setItem('cafe_auth', '1');
      await loadData();
      showView('adminView');
    } else { err.textContent = 'Contraseña incorrecta'; err.style.display = 'block'; }
  } catch (e) { err.textContent = 'Error de conexión'; err.style.display = 'block'; }
}

// ===== LOAD DATA =====
async function loadData() {
  let debates = await supa('debates?order=created_at.desc&limit=1');
  let debate;
  if (debates.length === 0) {
    const created = await supa('debates', { method: 'POST', body: JSON.stringify({
      title: 'Un café por la democracia',
      speakers: ['Panelista 1', 'Panelista 2', 'Panelista 3'],
      rules: ['Máximo 3 minutos por intervención', 'Respetar turno de palabra', 'No interrumpir al orador'],
      rounds: ['Ronda 1', 'Ronda 2', 'Debate libre', 'Cierre']
    })});
    debate = created[0];
  } else { debate = debates[0]; }

  S.debateId = debate.id;
  S.speakers = debate.speakers || [];
  S.rules = debate.rules || [];
  S.topics = await supa(`topics?debate_id=eq.${S.debateId}&order=position`);
  S.temaIdx = 0;

  // Load design
  try {
    const dRes = await supa("settings?key=eq.design&select=value");
    if (dRes.length > 0) S.design = JSON.parse(dRes[0].value);
  } catch(e) {}

  renderAdmin();
  applyDesign();
}

// ===== RENDER ADMIN =====
function renderAdmin() {
  document.getElementById('adminSpeakers').value = S.speakers.join('\n');
  document.getElementById('adminRules').value = S.rules.join('\n');
  document.getElementById('adminTimer').value = S.timerTotal;
  document.getElementById('colBg1').value = S.design.bgColor1 || '#e8752c';
  document.getElementById('colBg2').value = S.design.bgColor2 || '#1a0800';
  document.getElementById('colText').value = S.design.textColor || '#ffffff';
  document.getElementById('bgOverlay').value = S.design.overlay || 0;
  if (S.design.bgImage) {
    document.getElementById('bgPreview').innerHTML = `<img class="upload-preview" src="${S.design.bgImage}">`;
  }
  renderTopics();
}

function renderTopics() {
  const el = document.getElementById('topicsList');
  el.innerHTML = S.topics.map((t, i) => `
    <div class="topic-card">
      <h3>${i + 1}. ${t.title || 'Sin título'}</h3>
      <label>Título</label>
      <input value="${esc(t.title)}" oninput="S.topics[${i}].title=this.value;debounceSave()">
      <label>Contexto</label>
      <textarea oninput="S.topics[${i}].context=this.value;debounceSave()">${esc(t.context)}</textarea>
      <label>Preguntas guía</label>
      <textarea oninput="S.topics[${i}].questions=this.value;debounceSave()">${esc(t.questions)}</textarea>
      <label>Datos</label>
      <textarea oninput="S.topics[${i}].data=this.value;debounceSave()">${esc(t.data)}</textarea>
      <div class="topic-actions">
        <button class="btn-danger" onclick="removeTopic(${i})">Eliminar</button>
      </div>
    </div>
  `).join('');
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function addTopic() { S.topics.push({ title:'', context:'', questions:'', data:'' }); renderTopics(); debounceSave(); }
function removeTopic(i) { S.topics.splice(i,1); renderTopics(); debounceSave(); }

// ===== SAVE =====
let saveTimeout;
function debounceSave() { clearTimeout(saveTimeout); saveTimeout = setTimeout(saveAll, 1500); }

async function saveAll() {
  const status = document.getElementById('saveStatus');
  status.textContent = 'Guardando...';

  // Read admin fields
  S.speakers = document.getElementById('adminSpeakers').value.trim().split('\n').filter(Boolean);
  S.rules = document.getElementById('adminRules').value.trim().split('\n').filter(Boolean);
  S.timerTotal = parseInt(document.getElementById('adminTimer').value) || 180;
  S.design.bgColor1 = document.getElementById('colBg1').value;
  S.design.bgColor2 = document.getElementById('colBg2').value;
  S.design.textColor = document.getElementById('colText').value;
  S.design.overlay = document.getElementById('bgOverlay').value;

  try {
    await supa(`debates?id=eq.${S.debateId}`, { method: 'PATCH', body: JSON.stringify({ speakers: S.speakers, rules: S.rules, updated_at: new Date().toISOString() }) });
    await fetch(`${SUPA_URL}/rest/v1/topics?debate_id=eq.${S.debateId}`, { method: 'DELETE', headers: hdrs });
    if (S.topics.length > 0) {
      await supa('topics', { method: 'POST', body: JSON.stringify(S.topics.map((t,i) => ({ debate_id: S.debateId, position: i, title: t.title||'', context: t.context||'', questions: t.questions||'', data: t.data||'' }))) });
    }
    // Save design
    await fetch(`${SUPA_URL}/rest/v1/settings?key=eq.design`, { method: 'DELETE', headers: hdrs });
    await supa('settings', { method: 'POST', body: JSON.stringify({ key: 'design', value: JSON.stringify(S.design) }) });

    applyDesign();
    status.textContent = '✓ Guardado';
    setTimeout(() => { status.textContent = ''; }, 2500);
  } catch (e) { status.textContent = '✕ Error'; console.error(e); }
}

// ===== DESIGN =====
function applyDesign() {
  const d = S.design;
  const bgEl = document.getElementById('customBg');
  if (d.bgImage) {
    bgEl.style.backgroundImage = `url(${d.bgImage})`;
    document.body.style.background = `linear-gradient(rgba(0,0,0,${(d.overlay||0)/100}), rgba(0,0,0,${(d.overlay||0)/100}))`;
  } else {
    bgEl.style.backgroundImage = '';
    document.body.style.background = `linear-gradient(160deg, ${d.bgColor1||'#e8752c'} 0%, ${d.bgColor2||'#1a0800'} 100%)`;
  }
  if (d.textColor) document.body.style.color = d.textColor;
}

async function handleBgUpload(input) {
  const file = input.files[0]; if (!file) return;
  const path = `bg-${Date.now()}.${file.name.split('.').pop()}`;
  try {
    await fetch(`${SUPA_URL}/storage/v1/object/assets/${path}`, { method: 'POST', headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': file.type }, body: file });
    S.design.bgImage = `${SUPA_URL}/storage/v1/object/public/assets/${path}`;
    document.getElementById('bgPreview').innerHTML = `<img class="upload-preview" src="${S.design.bgImage}">`;
    applyDesign(); debounceSave();
  } catch (e) { alert('Error: ' + e.message); }
}
function removeBg() { S.design.bgImage = ''; document.getElementById('bgPreview').innerHTML = ''; applyDesign(); debounceSave(); }

// ===== LIVE MODE =====
let liveStartTime = null;
let questionsInterval = null;
let knownQIds = new Set();

function goLive() {
  try {
    S.timerTotal = parseInt(document.getElementById('adminTimer').value) || 180;
    S.timerRemaining = S.timerTotal;
    S.temaIdx = 0;
    updateTimer();
    renderLiveTopic();
    initQR();
    liveStartTime = new Date().toISOString();
    knownQIds = new Set();
    document.getElementById('questionsFeed').innerHTML = '';
    questionsInterval = setInterval(fetchQuestions, 5000);
    showView('liveView');
  } catch(e) { console.error('goLive error:', e); alert('Error: ' + e.message); }
}

function exitLive() {
  pauseTimer();
  if (questionsInterval) { clearInterval(questionsInterval); questionsInterval = null; }
  showView('adminView');
}

// ===== TIMER =====
function fmt(s) { return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0'); }
function updateTimer() {
  const el = document.getElementById('timer');
  el.textContent = fmt(S.timerRemaining);
  const pct = S.timerRemaining / S.timerTotal;
  el.className = 'timer ' + (pct > 0.5 ? 'green' : pct > 0.2 ? 'yellow' : 'red');
}
function toggleTimer() { S.timerRunning ? pauseTimer() : startTimer(); }
function startTimer() {
  if (S.timerRemaining <= 0) return;
  S.timerRunning = true; document.getElementById('btnToggle').textContent = 'Pausa';
  S.timerInterval = setInterval(() => { S.timerRemaining--; updateTimer(); if (S.timerRemaining <= 0) pauseTimer(); }, 1000);
}
function pauseTimer() {
  S.timerRunning = false; document.getElementById('btnToggle').textContent = 'Iniciar';
  clearInterval(S.timerInterval); S.timerInterval = null;
}
function resetTimer() { pauseTimer(); S.timerRemaining = S.timerTotal; updateTimer(); }

// ===== LIVE TOPICS =====
function renderLiveTopic() {
  const t = S.topics[S.temaIdx];
  if (!t) { document.getElementById('liveTopicTitle').textContent = '—'; document.getElementById('liveTopicInfo').innerHTML = ''; return; }
  document.getElementById('liveTopicTitle').textContent = t.title;
  let info = '';
  if (t.context) info += nl2br(t.context);
  if (t.questions) info += (info ? '<br><br>' : '') + '<strong>Preguntas:</strong><br>' + nl2br(t.questions);
  if (t.data) info += (info ? '<br><br>' : '') + '<strong>Datos:</strong><br>' + nl2br(t.data);
  document.getElementById('liveTopicInfo').innerHTML = info;
}
function nl2br(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>'); }

function nextTopic() { if (!S.topics.length) return; S.temaIdx = (S.temaIdx + 1) % S.topics.length; renderLiveTopic(); }
function prevTopic() { if (!S.topics.length) return; S.temaIdx = (S.temaIdx - 1 + S.topics.length) % S.topics.length; renderLiveTopic(); }
function randomTopic() {
  if (S.topics.length <= 1) return;
  let idx;
  do { idx = Math.floor(Math.random() * S.topics.length); } while (idx === S.temaIdx);
  S.temaIdx = idx;
  renderLiveTopic();
}

// ===== QUESTIONS =====
function initQR() {
  const baseUrl = window.location.href.replace(/\/[^\/]*$/, '/preguntas.html');
  document.getElementById('qrCode').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(baseUrl)}&bgcolor=ffffff&color=1a0800`;
}

async function fetchQuestions() {
  try {
    const qs = await supa(`questions?visible=eq.true&created_at=gte.${liveStartTime}&order=created_at.desc&limit=15`);
    const feed = document.getElementById('questionsFeed');
    const currentIds = new Set(qs.map(q => q.id));
    // Remove hidden
    feed.querySelectorAll('.q-item').forEach(el => { if (!currentIds.has(el.dataset.id)) el.remove(); });
    // Add new
    qs.slice().reverse().forEach(q => {
      if (knownQIds.has(q.id)) return;
      knownQIds.add(q.id);
      const time = new Date(q.created_at).toLocaleTimeString('es-CO', { hour:'2-digit', minute:'2-digit' });
      const div = document.createElement('div');
      div.className = 'q-item new'; div.dataset.id = q.id;
      div.innerHTML = `<div>${nl2br(q.text)}</div><div class="q-time">${time}</div>`;
      feed.prepend(div);
      setTimeout(() => div.classList.remove('new'), 500);
    });
  } catch (e) { console.error(e); }
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const isLive = document.getElementById('liveView').classList.contains('active');
  if (!isLive) return;
  switch(e.key) {
    case ' ': e.preventDefault(); toggleTimer(); break;
    case 'ArrowRight': nextTopic(); break;
    case 'ArrowLeft': prevTopic(); break;
    case 'r': case 'R': randomTopic(); break;
    case 'Escape': exitLive(); break;
  }
});

// ===== INIT =====
if (sessionStorage.getItem('cafe_auth') === '1') {
  loadData().then(() => showView('adminView')).catch(e => { console.error('Init error:', e); showView('adminView'); });
}
updateTimer();
</script>
