<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un café por la democracia</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --radius: 14px;
  --glass: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.12);
  --glass-hover: rgba(255,255,255,0.14);
  --text-primary: #fff;
  --text-secondary: rgba(255,255,255,0.6);
  --text-tertiary: rgba(255,255,255,0.35);
  --accent: rgba(255,255,255,0.9);
  --shadow: 0 8px 32px rgba(0,0,0,0.2);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; -webkit-font-smoothing: antialiased; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--text-primary); background: transparent; }

/* ===== VIEWS ===== */
.view { display: none; height: 100vh; flex-direction: column; }
.view.active { display: flex !important; }

/* ===== CUSTOM BG ===== */
.custom-bg {
  position: fixed; inset: 0; z-index: -1;
  background: linear-gradient(160deg, #e8752c 0%, #c45518 35%, #8a3510 65%, #1a0800 100%);
  background-size: cover; background-position: center;
}

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; font-size: 0.8rem; font-weight: 500;
  background: var(--glass); border: 1px solid var(--glass-border);
  color: var(--text-primary); border-radius: 8px; cursor: pointer;
  font-family: inherit; transition: all var(--transition);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.btn:hover { background: var(--glass-hover); border-color: rgba(255,255,255,0.25); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-primary { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.35); font-weight: 600; }
.btn-primary:hover { background: rgba(255,255,255,0.3); }
.btn-ghost { background: transparent; border-color: transparent; }
.btn-ghost:hover { background: var(--glass); }

/* ===== LOGIN ===== */
#loginView { align-items: center; justify-content: center; }
.login-card {
  text-align: center; max-width: 380px; width: 90%;
  padding: 48px 36px;
  background: var(--glass); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border: 1px solid var(--glass-border); border-radius: 20px;
  box-shadow: var(--shadow);
}
.login-card h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
.login-card p { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 28px; }
.login-card input {
  width: 100%; padding: 14px 18px; font-size: 1rem;
  background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px; color: #fff; font-family: inherit; text-align: center;
  letter-spacing: 2px; transition: border-color var(--transition);
}
.login-card input::placeholder { color: var(--text-tertiary); letter-spacing: 0; }
.login-card input:focus { outline: none; border-color: rgba(255,255,255,0.4); }
.login-card button {
  margin-top: 16px; width: 100%; padding: 14px;
  font-size: 0.9rem; font-weight: 600;
  background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.3);
  color: #fff; border-radius: 10px; cursor: pointer; font-family: inherit;
  transition: all var(--transition);
}
.login-card button:hover { background: rgba(255,255,255,0.25); }
.login-err { margin-top: 14px; font-size: 0.8rem; color: #ff9f9f; display: none; }

/* ===== ADMIN ===== */
#adminView { padding: 28px 36px; gap: 20px; overflow-y: auto; }
.admin-top { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.admin-top h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
.admin-top .ctrl { display: flex; gap: 8px; align-items: center; }
.save-status { font-size: 0.75rem; color: var(--text-secondary); }

.admin-grid {
  display: grid; grid-template-columns: 1.2fr 1fr; gap: 16px; flex: 1; overflow-y: auto;
  padding-bottom: 20px;
}
.card {
  background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  padding: 22px; box-shadow: var(--shadow);
  transition: border-color var(--transition);
}
.card:hover { border-color: rgba(255,255,255,0.2); }
.card h2 { font-size: 0.95rem; font-weight: 700; margin-bottom: 14px; letter-spacing: -0.3px; }
.card label {
  display: block; font-size: 0.65rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-secondary); margin-top: 12px; margin-bottom: 5px;
}
.card input[type="text"], .card input[type="number"], .card textarea {
  width: 100%; padding: 10px 12px;
  background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px; color: #fff; font-family: inherit; font-size: 0.85rem;
  transition: border-color var(--transition);
}
.card input:focus, .card textarea:focus { outline: none; border-color: rgba(255,255,255,0.25); }
.card textarea { min-height: 80px; resize: vertical; line-height: 1.6; }

/* Topic cards */
.topic-card {
  background: rgba(0,0,0,0.12); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px; padding: 16px; margin-bottom: 12px;
  transition: all var(--transition);
}
.topic-card:hover { border-color: rgba(255,255,255,0.15); }
.topic-card h3 { font-size: 0.85rem; font-weight: 600; margin-bottom: 10px; color: var(--text-secondary); }
.topic-actions { display: flex; gap: 6px; margin-top: 10px; }
.add-topic-btn {
  padding: 14px; text-align: center; border: 1.5px dashed rgba(255,255,255,0.15);
  border-radius: 10px; cursor: pointer; color: var(--text-tertiary);
  font-size: 0.85rem; transition: all var(--transition); margin-top: 12px;
}
.add-topic-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text-secondary); }

/* Design section */
.color-row { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
.color-row input[type="color"] { width: 36px; height: 36px; border: 2px solid rgba(255,255,255,0.15); border-radius: 8px; cursor: pointer; background: none; padding: 2px; }
.color-row span { font-size: 0.75rem; color: var(--text-secondary); }
.upload-area {
  margin-top: 8px; padding: 20px; text-align: center;
  border: 1.5px dashed rgba(255,255,255,0.2); border-radius: 10px; cursor: pointer;
  transition: all var(--transition); color: var(--text-tertiary); font-size: 0.8rem;
}
.upload-area:hover { border-color: rgba(255,255,255,0.4); color: var(--text-secondary); }
.upload-preview { max-width: 100%; max-height: 80px; margin-top: 10px; border-radius: 6px; opacity: 0.8; }

/* ===== LIVE VIEW ===== */
#liveView { padding: 0; position: relative; }
.live-header {
  position: absolute; top: 0; left: 0; right: 260px; z-index: 10;
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 36px;
  opacity: 0; transition: opacity 0.4s;
}
#liveView:hover .live-header { opacity: 1; }
.live-badge {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.7rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-secondary);
}
.live-dot { width: 8px; height: 8px; background: #ff453a; border-radius: 50%; animation: livePulse 2s ease-in-out infinite; }
@keyframes livePulse { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:0.6; transform:scale(0.85); } }

.live-body { flex: 1; display: grid; grid-template-columns: 1fr 260px; height: 100%; }
.live-center {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 60px 40px 40px;
  gap: 20px;
}

.timer {
  font-size: clamp(7rem, 20vw, 16rem);
  font-weight: 800; font-variant-numeric: tabular-nums;
  letter-spacing: -6px; line-height: 0.9;
  transition: color 0.5s ease;
}
.timer.green { color: var(--text-primary); }
.timer.yellow { color: #ffd60a; }
.timer.red { color: #ff453a; animation: timerPulse 1s ease-in-out infinite; }
@keyframes timerPulse { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }

.live-controls {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
}
.live-controls button {
  padding: 10px 20px; font-size: 0.78rem; font-weight: 600;
  background: var(--glass); border: 1px solid var(--glass-border);
  color: var(--text-primary); border-radius: 8px; cursor: pointer;
  font-family: inherit; transition: all var(--transition);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.live-controls button:hover { background: var(--glass-hover); transform: translateY(-1px); }
.live-controls button:active { transform: translateY(0); }
.live-controls .btn-random { border-color: rgba(255,214,10,0.3); color: #ffd60a; }
.live-controls .btn-random:hover { background: rgba(255,214,10,0.1); }

.live-topic {
  max-width: 640px; width: 100%; text-align: left;
  padding: 24px 28px;
  background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.live-topic-title { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 10px; }
.live-topic-info { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.65; }
.live-topic-info strong { color: var(--text-primary); font-weight: 600; }

/* Right panel */
.live-right {
  display: flex; flex-direction: column;
  padding: 24px 20px;
  border-left: 1px solid var(--glass-border);
  background: rgba(0,0,0,0.1);
}
.qr-section { text-align: center; margin-bottom: 16px; flex-shrink: 0; }
.qr-section img {
  width: 100px; height: 100px; border-radius: 10px;
  background: #fff; padding: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.qr-label { font-size: 0.6rem; color: var(--text-tertiary); margin-top: 8px; letter-spacing: 0.5px; }
.questions-title { font-size: 0.65rem; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
.questions-feed { flex: 1; overflow-y: auto; }
.questions-feed::-webkit-scrollbar { width: 2px; }
.questions-feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
.q-item {
  padding: 10px 12px; margin-bottom: 8px;
  background: rgba(255,255,255,0.05); border-radius: 8px;
  font-size: 0.8rem; line-height: 1.45; color: var(--text-secondary);
  border: 1px solid rgba(255,255,255,0.05);
  transition: all var(--transition);
}
.q-item.new { animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
@keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.q-time { font-size: 0.55rem; color: var(--text-tertiary); margin-top: 4px; }

/* Scrollbar for admin */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<div class="custom-bg" id="customBg"></div>

<!-- ===== LOGIN ===== -->
<div class="view active" id="loginView">
  <div class="login-card">
    <h1>Un café por la<br>democracia</h1>
    <p>Acceso moderadores</p>
    <input type="password" id="loginPass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Entrar</button>
    <div class="login-err" id="loginErr">Contraseña incorrecta</div>
  </div>
</div>

<!-- ===== ADMIN ===== -->
<div class="view" id="adminView">
  <div class="admin-top">
    <h1>Conversatorio</h1>
    <div class="ctrl">
      <span class="save-status" id="saveStatus"></span>
      <button class="btn" onclick="saveAll()">Guardar</button>
      <button class="btn btn-primary" onclick="goLive()">▶ &nbsp;Iniciar LIVE</button>
    </div>
  </div>

  <div class="admin-grid">
    <!-- TOPICS -->
    <div class="card" style="grid-row: span 2; overflow-y: auto;">
      <h2>Temas del debate</h2>
      <div id="topicsList"></div>
      <div class="add-topic-btn" onclick="addTopic()">+ Agregar tema</div>
    </div>

    <!-- CONFIG -->
    <div class="card">
      <h2>Configuración</h2>
      <label>Panelistas (uno por línea)</label>
      <textarea id="adminSpeakers" rows="4" oninput="debounceSave()"></textarea>
      <label>Reglas (una por línea)</label>
      <textarea id="adminRules" rows="4" oninput="debounceSave()"></textarea>
      <label>Duración timer (segundos)</label>
      <input type="number" id="adminTimer" value="180" style="width:100px" oninput="debounceSave()">
      <label>🎲 Preguntas random (una por línea)</label>
      <textarea id="adminRandom" rows="5" oninput="debounceSave()" placeholder="Se extraen sin repetición durante la sesión live..."></textarea>
    </div>

    <!-- DESIGN -->
    <div class="card">
      <h2>Diseño</h2>
      <label>Imagen de fondo</label>
      <div class="upload-area" onclick="document.getElementById('bgFile').click()">
        <input type="file" id="bgFile" accept="image/*" onchange="handleBgUpload(this)" style="display:none">
        Click para subir imagen
        <div id="bgPreview"></div>
      </div>
      <button class="btn btn-ghost" style="margin-top:6px;font-size:0.7rem;" onclick="removeBg()">Quitar imagen</button>
      <label>Gradiente</label>
      <div class="color-row">
        <input type="color" id="colBg1" value="#e8752c" onchange="previewDesign()">
        <span>Inicio</span>
        <input type="color" id="colBg2" value="#1a0800" onchange="previewDesign()">
        <span>Final</span>
      </div>
      <label>Texto</label>
      <div class="color-row">
        <input type="color" id="colText" value="#ffffff" onchange="previewDesign()">
      </div>
      <label>Oscurecer imagen</label>
      <input type="range" id="bgOverlay" min="0" max="80" value="0" style="width:100%" oninput="previewDesign()">
    </div>
  </div>
</div>

<!-- ===== LIVE ===== -->
<div class="view" id="liveView">
  <div class="live-header">
    <div class="live-badge"><div class="live-dot"></div> EN VIVO</div>
    <button class="btn" onclick="exitLive()">✕ &nbsp;Salir</button>
  </div>

  <div class="live-body">
    <div class="live-center">
      <div class="timer green" id="timer">03:00</div>
      <div class="live-controls">
        <button onclick="toggleTimer()" id="btnToggle">Iniciar</button>
        <button onclick="resetTimer()">Reset</button>
        <button onclick="prevTopic()">←</button>
        <button onclick="nextTopic()">→</button>
        <button class="btn-random" onclick="randomQuestion()">🎲 Random</button>
      </div>
      <div class="live-topic">
        <div class="live-topic-title" id="liveTopicTitle">—</div>
        <div class="live-topic-info" id="liveTopicInfo"></div>
      </div>
    </div>

    <div class="live-right">
      <div class="qr-section">
        <img id="qrCode" alt="QR">
        <div class="qr-label">Escanea para preguntar</div>
      </div>
      <div class="questions-title">Preguntas del público</div>
      <div class="questions-feed" id="questionsFeed"></div>
    </div>
  </div>
</div>

<script>
// ===== SUPABASE =====
const SUPA_URL = 'https://subbsyrooygdevejvdlm.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1YmJzeXJvb3lnZGV2ZWp2ZGxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDQ2MTQsImV4cCI6MjA5NjU4MDYxNH0.BT-tGx2-JRosfmNz9AKgVpzdNnvvPK5EzuJEi0EmCYI';
const hdrs = { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

async function supa(path, opts = {}) {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, { headers: hdrs, ...opts });
  if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
  return res.status === 204 ? null : res.json();
}

// ===== STATE =====
const S = {
  debateId: null,
  speakers: [],
  rules: [],
  topics: [],
  randomQuestions: [],
  randomUsed: [],
  design: { bgColor1: '#e8752c', bgColor2: '#1a0800', textColor: '#ffffff', bgImage: '', overlay: 0 },
  temaIdx: 0,
  timerTotal: 180,
  timerRemaining: 180,
  timerRunning: false,
  timerInterval: null,
};

// ===== VIEWS =====
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== LOGIN =====
async function doLogin() {
  const pass = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  try {
    const res = await supa("settings?key=eq.moderator_password&select=value");
    if (res.length && pass === res[0].value) {
      sessionStorage.setItem('cafe_auth', '1');
      await loadData();
      showView('adminView');
    } else { err.textContent = 'Contraseña incorrecta'; err.style.display = 'block'; }
  } catch (e) { err.textContent = 'Error de conexión'; err.style.display = 'block'; }
}

// ===== LOAD =====
async function loadData() {
  let debates = await supa('debates?order=created_at.desc&limit=1');
  let debate;
  if (debates.length === 0) {
    const created = await supa('debates', { method: 'POST', body: JSON.stringify({
      title: 'Un café por la democracia',
      speakers: ['Panelista 1', 'Panelista 2'],
      rules: ['Máximo 3 minutos por intervención', 'Respetar turno de palabra'],
      rounds: ['Ronda 1', 'Ronda 2', 'Debate libre']
    })});
    debate = created[0];
  } else { debate = debates[0]; }

  S.debateId = debate.id;
  S.speakers = debate.speakers || [];
  S.rules = debate.rules || [];
  S.topics = await supa(`topics?debate_id=eq.${S.debateId}&order=position`);
  S.temaIdx = 0;

  try {
    const rqs = await supa(`random_questions?debate_id=eq.${S.debateId}&order=created_at`);
    S.randomQuestions = rqs.map(r => r.text);
  } catch(e) { S.randomQuestions = []; }

  try {
    const dRes = await supa("settings?key=eq.design&select=value");
    if (dRes.length > 0) S.design = JSON.parse(dRes[0].value);
  } catch(e) {}

  renderAdmin();
  applyDesign();
}

// ===== ADMIN RENDER =====
function renderAdmin() {
  document.getElementById('adminSpeakers').value = S.speakers.join('\n');
  document.getElementById('adminRules').value = S.rules.join('\n');
  document.getElementById('adminRandom').value = S.randomQuestions.join('\n');
  document.getElementById('adminTimer').value = S.timerTotal;
  document.getElementById('colBg1').value = S.design.bgColor1 || '#e8752c';
  document.getElementById('colBg2').value = S.design.bgColor2 || '#1a0800';
  document.getElementById('colText').value = S.design.textColor || '#ffffff';
  document.getElementById('bgOverlay').value = S.design.overlay || 0;
  if (S.design.bgImage) document.getElementById('bgPreview').innerHTML = `<img class="upload-preview" src="${S.design.bgImage}">`;
  renderTopics();
}

function renderTopics() {
  document.getElementById('topicsList').innerHTML = S.topics.map((t, i) => `
    <div class="topic-card">
      <h3>Tema ${i + 1}</h3>
      <label>Título</label>
      <input type="text" value="${esc(t.title)}" oninput="S.topics[${i}].title=this.value;debounceSave()">
      <label>Contexto</label>
      <textarea oninput="S.topics[${i}].context=this.value;debounceSave()">${esc(t.context)}</textarea>
      <label>Preguntas guía</label>
      <textarea oninput="S.topics[${i}].questions=this.value;debounceSave()">${esc(t.questions)}</textarea>
      <label>Datos</label>
      <textarea oninput="S.topics[${i}].data=this.value;debounceSave()">${esc(t.data)}</textarea>
      <div class="topic-actions"><button class="btn btn-ghost" onclick="removeTopic(${i})">Eliminar</button></div>
    </div>
  `).join('');
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function addTopic() { S.topics.push({ title:'', context:'', questions:'', data:'' }); renderTopics(); debounceSave(); }
function removeTopic(i) { S.topics.splice(i,1); renderTopics(); debounceSave(); }

// ===== SAVE =====
let saveTimeout;
function debounceSave() { clearTimeout(saveTimeout); saveTimeout = setTimeout(saveAll, 2000); }

async function saveAll() {
  const status = document.getElementById('saveStatus');
  status.textContent = 'Guardando...';
  S.speakers = document.getElementById('adminSpeakers').value.trim().split('\n').filter(Boolean);
  S.rules = document.getElementById('adminRules').value.trim().split('\n').filter(Boolean);
  S.randomQuestions = document.getElementById('adminRandom').value.trim().split('\n').filter(Boolean);
  S.timerTotal = parseInt(document.getElementById('adminTimer').value) || 180;
  S.design.bgColor1 = document.getElementById('colBg1').value;
  S.design.bgColor2 = document.getElementById('colBg2').value;
  S.design.textColor = document.getElementById('colText').value;
  S.design.overlay = document.getElementById('bgOverlay').value;

  try {
    await supa(`debates?id=eq.${S.debateId}`, { method: 'PATCH', body: JSON.stringify({ speakers: S.speakers, rules: S.rules, updated_at: new Date().toISOString() }) });
    await fetch(`${SUPA_URL}/rest/v1/topics?debate_id=eq.${S.debateId}`, { method: 'DELETE', headers: hdrs });
    if (S.topics.length > 0) {
      await supa('topics', { method: 'POST', body: JSON.stringify(S.topics.map((t,i) => ({ debate_id: S.debateId, position: i, title: t.title||'', context: t.context||'', questions: t.questions||'', data: t.data||'' }))) });
    }
    await fetch(`${SUPA_URL}/rest/v1/random_questions?debate_id=eq.${S.debateId}`, { method: 'DELETE', headers: hdrs });
    if (S.randomQuestions.length > 0) {
      await supa('random_questions', { method: 'POST', body: JSON.stringify(S.randomQuestions.map(text => ({ debate_id: S.debateId, text }))) });
    }
    await fetch(`${SUPA_URL}/rest/v1/settings?key=eq.design`, { method: 'DELETE', headers: hdrs });
    await supa('settings', { method: 'POST', body: JSON.stringify({ key: 'design', value: JSON.stringify(S.design) }) });
    applyDesign();
    status.textContent = '✓';
    setTimeout(() => { status.textContent = ''; }, 2000);
  } catch (e) { status.textContent = '✕ Error'; console.error(e); }
}

// ===== DESIGN =====
function applyDesign() {
  const d = S.design;
  const bgEl = document.getElementById('customBg');
  if (d.bgImage) {
    bgEl.style.backgroundImage = `linear-gradient(rgba(0,0,0,${(d.overlay||0)/100}), rgba(0,0,0,${(d.overlay||0)/100})), url(${d.bgImage})`;
  } else {
    bgEl.style.backgroundImage = `linear-gradient(160deg, ${d.bgColor1||'#e8752c'} 0%, ${d.bgColor2||'#1a0800'} 100%)`;
  }
  if (d.textColor) document.body.style.color = d.textColor;
}

function previewDesign() {
  S.design.bgColor1 = document.getElementById('colBg1').value;
  S.design.bgColor2 = document.getElementById('colBg2').value;
  S.design.textColor = document.getElementById('colText').value;
  S.design.overlay = document.getElementById('bgOverlay').value;
  applyDesign();
  debounceSave();
}

async function handleBgUpload(input) {
  const file = input.files[0]; if (!file) return;
  const path = `bg-${Date.now()}.${file.name.split('.').pop()}`;
  try {
    await fetch(`${SUPA_URL}/storage/v1/object/assets/${path}`, { method: 'POST', headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': file.type }, body: file });
    S.design.bgImage = `${SUPA_URL}/storage/v1/object/public/assets/${path}`;
    document.getElementById('bgPreview').innerHTML = `<img class="upload-preview" src="${S.design.bgImage}">`;
    applyDesign(); debounceSave();
  } catch (e) { alert('Error: ' + e.message); }
}
function removeBg() { S.design.bgImage = ''; document.getElementById('bgPreview').innerHTML = ''; applyDesign(); debounceSave(); }

// ===== LIVE =====
let liveStartTime = null;
let questionsInterval = null;
let knownQIds = new Set();

function goLive() {
  try {
    S.timerTotal = parseInt(document.getElementById('adminTimer').value) || 180;
    S.timerRemaining = S.timerTotal;
    S.temaIdx = 0;
    S.randomUsed = [];
    updateTimer();
    renderLiveTopic();
    initQR();
    liveStartTime = new Date().toISOString();
    knownQIds = new Set();
    document.getElementById('questionsFeed').innerHTML = '';
    questionsInterval = setInterval(fetchQuestions, 5000);
    showView('liveView');
  } catch(e) { console.error(e); alert('Error: ' + e.message); }
}

function exitLive() {
  pauseTimer();
  if (questionsInterval) { clearInterval(questionsInterval); questionsInterval = null; }
  showView('adminView');
}

// ===== TIMER =====
function fmt(s) { return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0'); }
function updateTimer() {
  const el = document.getElementById('timer');
  el.textContent = fmt(S.timerRemaining);
  const pct = S.timerRemaining / S.timerTotal;
  el.className = 'timer ' + (pct > 0.5 ? 'green' : pct > 0.2 ? 'yellow' : 'red');
}
function toggleTimer() { S.timerRunning ? pauseTimer() : startTimer(); }
function startTimer() {
  if (S.timerRemaining <= 0) return;
  S.timerRunning = true; document.getElementById('btnToggle').textContent = 'Pausa';
  S.timerInterval = setInterval(() => { S.timerRemaining--; updateTimer(); if (S.timerRemaining <= 0) pauseTimer(); }, 1000);
}
function pauseTimer() {
  S.timerRunning = false; document.getElementById('btnToggle').textContent = 'Iniciar';
  clearInterval(S.timerInterval); S.timerInterval = null;
}
function resetTimer() { pauseTimer(); S.timerRemaining = S.timerTotal; updateTimer(); }

// ===== LIVE TOPICS =====
function renderLiveTopic() {
  const t = S.topics[S.temaIdx];
  if (!t) { document.getElementById('liveTopicTitle').textContent = '—'; document.getElementById('liveTopicInfo').innerHTML = ''; return; }
  document.getElementById('liveTopicTitle').textContent = t.title;
  let info = '';
  if (t.context) info += nl2br(t.context);
  if (t.questions) info += (info ? '<br><br>' : '') + '<strong>Preguntas:</strong><br>' + nl2br(t.questions);
  if (t.data) info += (info ? '<br><br>' : '') + '<strong>Datos:</strong><br>' + nl2br(t.data);
  document.getElementById('liveTopicInfo').innerHTML = info;
}
function nl2br(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>'); }
function nextTopic() { if (!S.topics.length) return; S.temaIdx = (S.temaIdx + 1) % S.topics.length; renderLiveTopic(); }
function prevTopic() { if (!S.topics.length) return; S.temaIdx = (S.temaIdx - 1 + S.topics.length) % S.topics.length; renderLiveTopic(); }

// ===== RANDOM (no repeats) =====
function randomQuestion() {
  if (S.randomQuestions.length === 0) return;
  // Get remaining questions
  const remaining = S.randomQuestions.filter((_, i) => !S.randomUsed.includes(i));
  if (remaining.length === 0) {
    // All used — reset
    S.randomUsed = [];
    return randomQuestion();
  }
  // Pick a random one from remaining
  const availableIndices = S.randomQuestions.map((_, i) => i).filter(i => !S.randomUsed.includes(i));
  const pick = availableIndices[Math.floor(Math.random() * availableIndices.length)];
  S.randomUsed.push(pick);

  const q = S.randomQuestions[pick];
  document.getElementById('liveTopicTitle').textContent = `🎲 Pregunta al azar`;
  document.getElementById('liveTopicInfo').innerHTML = `<span style="font-size:1.15rem;color:var(--text-primary);">${nl2br(q)}</span>
    <br><span style="font-size:0.7rem;color:var(--text-tertiary);margin-top:8px;display:inline-block;">${S.randomUsed.length} / ${S.randomQuestions.length} usadas</span>`;
}

// ===== AUDIENCE QUESTIONS =====
function initQR() {
  const baseUrl = window.location.href.replace(/\/[^\/]*$/, '/preguntas.html');
  document.getElementById('qrCode').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(baseUrl)}&bgcolor=ffffff&color=1a0800`;
}

async function fetchQuestions() {
  try {
    const qs = await supa(`questions?visible=eq.true&created_at=gte.${liveStartTime}&order=created_at.desc&limit=15`);
    const feed = document.getElementById('questionsFeed');
    const currentIds = new Set(qs.map(q => q.id));
    feed.querySelectorAll('.q-item').forEach(el => { if (!currentIds.has(el.dataset.id)) el.remove(); });
    qs.slice().reverse().forEach(q => {
      if (knownQIds.has(q.id)) return;
      knownQIds.add(q.id);
      const time = new Date(q.created_at).toLocaleTimeString('es-CO', { hour:'2-digit', minute:'2-digit' });
      const div = document.createElement('div');
      div.className = 'q-item new'; div.dataset.id = q.id;
      div.innerHTML = `<div>${nl2br(q.text)}</div><div class="q-time">${time}</div>`;
      feed.prepend(div);
      setTimeout(() => div.classList.remove('new'), 500);
    });
  } catch (e) { console.error(e); }
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const isLive = document.getElementById('liveView').classList.contains('active');
  if (!isLive) return;
  switch(e.key) {
    case ' ': e.preventDefault(); toggleTimer(); break;
    case 'ArrowRight': nextTopic(); break;
    case 'ArrowLeft': prevTopic(); break;
    case 'r': case 'R': randomQuestion(); break;
    case 'Escape': exitLive(); break;
  }
});

// ===== INIT =====
if (sessionStorage.getItem('cafe_auth') === '1') {
  loadData().then(() => showView('adminView')).catch(() => showView('adminView'));
}
</script>
